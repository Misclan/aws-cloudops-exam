<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <main id="quiz-container" class="w-full max-w-2xl">
        <div id="loading" class="text-center">
            <p class="text-xl animate-pulse">Fetching CloudOps Data...</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/prod/questions'; 

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // Handle double-stringified data from Lambda
                if (typeof data === 'string') data = JSON.parse(data);
                
                // Sort sequentially to fix the "weird ordering"
                currentQuestions = data.sort((a, b) => a.QuestionID - b.QuestionID);
                renderQuestion();
            } catch (error) {
                console.error("Fetch failed:", error);
            }
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('quiz-container');
            
            // 1. Reset container with a safe shell
            container.innerHTML = `
                <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
                    <h2 id="q-text" class="text-xl font-bold mb-8 leading-relaxed"></h2>
                    <div id="options-grid" class="space-y-4"></div>
                    <div id="feedback-box" class="hidden mt-8 p-6 rounded-xl border-2"></div>
                    <button id="next-btn" class="hidden mt-8 w-full bg-orange-600 py-4 rounded-xl font-black">NEXT QUESTION</button>
                </div>
            `;

            // 2. Safely set question text (prevents SyntaxErrors)
            document.getElementById('q-text').textContent = q.QuestionText;

            const optionsGrid = document.getElementById('options-grid');
            q.Options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border border-slate-600 bg-slate-700/50 hover:bg-slate-700 transition-all";
                
                // Use textContent so the browser doesn't execute 'Principal': {'AWS': ...}
                btn.textContent = opt; 
                
                btn.onclick = () => validateSelection(btn, opt, q.CorrectAnswer, q.Explanation);
                optionsGrid.appendChild(btn);
            });

            document.getElementById('next-btn').onclick = () => {
                currentIndex++;
                if (currentIndex < currentQuestions.length) renderQuestion();
                else showFinal();
            };
        }

        function validateSelection(selectedBtn, selectedText, correctText, explanationText) {
            document.querySelectorAll('#options-grid button').forEach(b => b.disabled = true);
            
            const feedback = document.getElementById('feedback-box');
            feedback.classList.remove('hidden');

            if (selectedText === correctText) {
                score++;
                selectedBtn.classList.add('border-green-500', 'bg-green-500/10', 'text-green-400');
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-green-500/50 bg-green-900/30 text-green-100";
                feedback.innerHTML = `<p class="font-bold text-lg mb-2 text-green-400">✅ Correct!</p>`;
            } else {
                selectedBtn.classList.add('border-red-500', 'bg-red-500/10', 'text-red-400');
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-red-500/50 bg-red-900/30 text-red-100";
                feedback.innerHTML = `<p class="font-bold text-lg mb-2 text-red-400">❌ Incorrect.</p>
                                    <p class="text-sm opacity-80 mb-2">The answer was: ${correctText}</p>`;
            }

            // 3. SAFE Explanation Injection
            const explainDiv = document.createElement('div');
            explainDiv.className = "mt-4 pt-4 border-t border-slate-600 text-sm italic text-slate-300";
            explainDiv.innerHTML = `<strong>Why?</strong> `;
            
            const textNode = document.createTextNode(explanationText); // The ultimate fix
            explainDiv.appendChild(textNode);
            feedback.appendChild(explainDiv);

            document.getElementById('next-btn').classList.remove('hidden');
        }

        function showFinal() {
            document.getElementById('quiz-container').innerHTML = `<div class="text-center p-12 bg-slate-800 rounded-2xl border border-slate-700">
                <h2 class="text-3xl font-bold mb-4 text-orange-500">Exam Complete</h2>
                <p class="text-6xl font-black">${score} / ${currentQuestions.length}</p>
                <button onclick="location.reload()" class="mt-8 bg-slate-700 px-8 py-3 rounded-lg">RESTART</button>
            </div>`;
        }

        fetchQuestions();
    </script>
</body>
</html>
