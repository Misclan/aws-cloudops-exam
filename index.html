<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-orange-500 mb-2">CloudOps Exam Pro</h1>
        <p class="text-slate-400">Powered by AWS Lambda & DynamoDB (af-south-1)</p>
    </header>

    <main id="quiz-container" class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p>Fetching questions from Cape Town...</p>
        </div>
        <div id="quiz-content" class="hidden">
            </div>
    </main>

    <script>
        // Replace with your actual API Gateway URL
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/prod/questions'; 

        let currentQuestions = [];

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // Handle the "weird" stringified data format
                if (typeof data === 'string') data = JSON.parse(data);
                
                currentQuestions = data;
                displayQuestions();
            } catch (err) {
                console.error("Failed to load:", err);
            }
        }
        

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('quiz-container');
            
            // Using Tailwind for a clean layout
            container.innerHTML = `
                <div class="bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700">
                    <div class="flex justify-between mb-4 text-slate-400 text-sm">
                        <span>Question ${currentIndex + 1} of ${currentQuestions.length}</span>
                        <span>Score: ${score}</span>
                    </div>
                    <p class="text-xl font-semibold mb-6">${q.QuestionText}</p>
                    <div class="space-y-3">
                        ${q.Options.map(opt => `
                            <button class="option-btn w-full text-left p-4 rounded-lg border border-slate-600 hover:bg-slate-700 transition-all"
                                    onclick="checkAnswer(this, '${opt}', '${q.CorrectAnswer}', '${q.Explanation.replace(/'/g, "\\'")}')">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="feedback" class="hidden mt-6 p-4 rounded-lg border"></div>
                    <button id="next-btn" class="hidden mt-6 w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-lg transition" 
                            onclick="nextQuestion()">Next Question</button>
                </div>
            `;
        }

        function checkAnswer(btn, questionIndex, selectedOption) {
            const q = currentQuestions[questionIndex]; // Get data safely from the array
            const feedbackDiv = document.getElementById('feedback');
            
            // Disable all options for this question
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            feedbackDiv.className = "mt-4 p-4 rounded-lg border block shadow-sm";

            if (selectedOption === q.CorrectAnswer) {
                btn.className = "w-full p-3 mb-2 rounded bg-green-600 text-white border-green-700";
                feedbackDiv.classList.add('bg-green-50', 'text-green-800', 'border-green-200');
                feedbackDiv.innerHTML = `<p class="font-bold">✅ Correct!</p>`;
            } else {
                btn.className = "w-full p-3 mb-2 rounded bg-red-600 text-white border-red-700";
                feedbackDiv.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
                feedbackDiv.innerHTML = `<p class="font-bold">❌ Incorrect.</p>
                                        <p class="text-sm">Correct answer: ${q.CorrectAnswer}</p>`;
            }

            // Display the explanation safely
            feedbackDiv.innerHTML += `
                <div class="mt-2 pt-2 border-t border-gray-300 text-sm italic text-gray-700">
                    <strong>Why?</strong> ${q.Explanation}
                </div>
            `;
            
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                document.getElementById('quiz-container').innerHTML = `
                    <div class="text-center bg-slate-800 p-10 rounded-xl border border-slate-700">
                        <h2 class="text-3xl font-bold mb-4">Exam Complete!</h2>
                        <p class="text-2xl text-orange-500 mb-6">Final Score: ${score} / ${currentQuestions.length}</p>
                        <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-lg transition">Try Again</button>
                    </div>
                `;
            }
        }

        fetchQuestions();
    </script>
</body>
</html>
