<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-orange-500 mb-2">CloudOps Exam Pro</h1>
        <p class="text-slate-400">Powered by AWS Lambda & DynamoDB (af-south-1)</p>
    </header>

    <main id="quiz-container" class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p>Fetching questions from Cape Town...</p>
        </div>
        <div id="quiz-content" class="hidden">
            </div>
    </main>

    <script>
        // REPLACE THIS URL with your actual API Gateway endpoint
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/questions';

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                displayQuestions(data);
            } catch (error) {
                document.getElementById('loading').innerHTML = 
                    `<p class="text-red-400">Error: Could not connect to API. Check CORS settings!</p>`;
            }
        }

        function displayQuestions(questions) {
            const container = document.getElementById('quiz-content');
            const loading = document.getElementById('loading');
            
            loading.classList.add('hidden');
            container.classList.remove('hidden');

            const shuffled = questions.sort(() => 0.5 - Math.random());

            container.innerHTML = shuffled.map((q, index) => `
                <div class="mb-8 border-b border-slate-700 pb-6">
                    <h3 class="text-xl font-semibold mb-4">${index + 1}. ${q.QuestionText}</h3>
                    <div class="space-y-3">
                        ${q.Options.map(opt => `
                            <button onclick="checkAnswer(this, '${opt}', '${q.CorrectAnswer}')" 
                                    class="w-full text-left p-3 rounded bg-slate-700 hover:bg-slate-600 transition border border-transparent">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function checkAnswer(btn, selected, correct) {
            const buttons = btn.parentElement.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true); // Disable after click

            if (selected === correct) {
                btn.classList.add('bg-green-600', 'border-green-400');
            } else {
                btn.classList.add('bg-red-600', 'border-red-400');
            }
        }

        fetchQuestions();
    </script>
</body>
</html>
