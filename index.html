<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-orange-500 mb-2">CloudOps Exam Pro</h1>
        <p class="text-slate-400">Powered by AWS Lambda & DynamoDB (af-south-1)</p>
    </header>

    <main id="quiz-container" class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p>Fetching questions from Cape Town...</p>
        </div>
        <div id="quiz-content" class="hidden">
            </div>
    </main>

    <script>
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/prod/questions'; 

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // Handle the stringified JSON format
                if (typeof data === 'string') {
                    data = JSON.parse(data);
                }
                
                currentQuestions = data;
                renderQuestion();
            } catch (error) {
                console.error("CloudOps Error:", error);
            }
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('quiz-container');
            
            // 1. Setup the UI Shell
            container.innerHTML = `
                <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl">
                    <h2 class="text-2xl font-bold mb-8">${q.QuestionText}</h2>
                    <div id="options-list" class="space-y-4"></div>
                    <div id="feedback-area" class="hidden mt-8 p-6 rounded-xl border-2"></div>
                    <button id="next-btn" class="hidden mt-8 w-full bg-orange-600 py-4 rounded-xl font-bold hover:bg-orange-500 transition">NEXT QUESTION</button>
                </div>
            `;

            const optionsList = document.getElementById('options-list');

            // 2. The Safe Injection: We don't use 'onclick' in the string!
            q.Options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border border-slate-600 bg-slate-700/50 hover:bg-slate-700 transition-all";
                btn.textContent = opt; // Safe way to handle quotes/apostrophes
                
                // Use an Event Listener instead of an 'onclick' attribute
                btn.addEventListener('click', () => {
                    processSelection(btn, opt, q.CorrectAnswer, q.Explanation);
                });
                
                optionsList.appendChild(btn);
            });

            document.getElementById('next-btn').addEventListener('click', () => {
                currentIndex++;
                if (currentIndex < currentQuestions.length) renderQuestion();
                else showFinal();
            });
        }

        function processSelection(selectedBtn, selectedText, correctText, explanationText) {
            // Disable all buttons immediately
            document.querySelectorAll('#options-list button').forEach(b => b.disabled = true);
            
            const feedback = document.getElementById('feedback-area');
            feedback.classList.remove('hidden');

            if (selectedText === correctText) {
                score++;
                selectedBtn.classList.add('border-green-500', 'bg-green-900/30', 'text-green-400');
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-green-500/50 bg-green-500/10 text-green-100";
                feedback.innerHTML = `<p class="font-bold text-xl mb-2 text-green-400">✅ Correct!</p>`;
            } else {
                selectedBtn.classList.add('border-red-500', 'bg-red-900/30', 'text-red-400');
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-red-500/50 bg-red-500/10 text-red-100";
                feedback.innerHTML = `<p class="font-bold text-xl mb-2 text-red-400">❌ Incorrect.</p>
                                    <p class="text-sm opacity-80 mb-2">Answer: ${correctText}</p>`;
            }

            // This will finally show the explanation because it's handled as a variable, not HTML text
            feedback.innerHTML += `<div class="mt-4 pt-4 border-t border-slate-600 italic text-slate-300">
                                        <strong>Why?</strong> ${explanationText}
                                </div>`;
            
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function showFinal() {
            document.getElementById('quiz-container').innerHTML = `
                <div class="text-center p-10 bg-slate-800 rounded-2xl border border-slate-700">
                    <h2 class="text-3xl font-bold mb-4">Exam Complete</h2>
                    <p class="text-5xl text-orange-500 font-bold mb-8">${score} / ${currentQuestions.length}</p>
                    <button onclick="location.reload()" class="bg-slate-700 px-8 py-3 rounded-lg">Try Again</button>
                </div>
            `;
        }

        fetchQuestions();
    </script>
</body>
</html>
