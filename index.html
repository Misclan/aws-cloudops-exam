<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-orange-500 mb-2">CloudOps Exam Pro</h1>
        <p class="text-slate-400">Powered by AWS Lambda & DynamoDB (af-south-1)</p>
    </header>

    <main id="quiz-container" class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p>Fetching questions from Cape Town...</p>
        </div>
        <div id="quiz-content" class="hidden">
            </div>
    </main>

    <script>
        // Use your specific API URL from image_cac56c.jpg
        // 1. Configuration
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/prod/questions'; 

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        // 2. Fetch and Parse Data
        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // Fix for the "weird" stringified format seen in Inspect
                if (typeof data === 'string') {
                    data = JSON.parse(data);
                }
                
                currentQuestions = data;
                renderQuestion();
            } catch (error) {
                console.error("CloudOps Error: Could not fetch data", error);
                document.getElementById('quiz-container').innerHTML = `<p class="text-red-500">Error loading questions. Check API.</p>`;
            }
        }

        // 3. Render Question UI
        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('quiz-container');
            
            container.innerHTML = `
                <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 animate-fade-in">
                    <div class="flex justify-between mb-6 text-slate-400 text-xs font-mono uppercase tracking-widest">
                        <span>Question ${currentIndex + 1} of ${currentQuestions.length}</span>
                        <span>Current Score: ${score}</span>
                    </div>
                    
                    <h2 class="text-2xl font-bold mb-8 leading-tight">${q.QuestionText}</h2>
                    
                    <div id="options-grid" class="grid gap-4"></div>
                    
                    <div id="feedback" class="hidden mt-8 p-6 rounded-xl border-2 transition-all duration-300"></div>
                    
                    <button id="next-btn" class="hidden mt-8 w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl transition-all transform hover:scale-[1.02]" 
                            onclick="goToNext()">
                        NEXT QUESTION →
                    </button>
                </div>
            `;

            // Create buttons via JS to prevent apostrophe/SyntaxErrors
            const optionsGrid = document.getElementById('options-grid');
            q.Options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-xl border border-slate-600 bg-slate-700/50 hover:bg-slate-700 hover:border-slate-400 transition-all group";
                btn.innerHTML = `<span class="text-slate-300 group-hover:text-white">${option}</span>`;
                btn.onclick = () => validateAnswer(btn, option, q.CorrectAnswer, q.Explanation);
                optionsGrid.appendChild(btn);
            });
        }

        // 4. Logic & Feedback
        function validateAnswer(selectedBtn, selectedText, correctText, explanationText) {
            // Disable all buttons immediately
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');

            if (selectedText === correctText) {
                score++;
                selectedBtn.className = "option-btn w-full text-left p-5 rounded-xl border-2 border-green-500 bg-green-500/10 text-green-400";
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-green-500/50 bg-green-500/10 text-green-100 block";
                feedback.innerHTML = `<p class="text-xl font-bold mb-2 text-green-400">✅ Spot On!</p>`;
            } else {
                selectedBtn.className = "option-btn w-full text-left p-5 rounded-xl border-2 border-red-500 bg-red-500/10 text-red-400";
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-red-500/50 bg-red-500/10 text-red-100 block";
                feedback.innerHTML = `<p class="text-xl font-bold mb-2 text-red-400">❌ Not Quite.</p>
                                    <p class="text-sm mb-2 opacity-80">Correct Answer: <span class="font-bold">${correctText}</span></p>`;
            }

            // Append explanation safely
            feedback.innerHTML += `<div class="mt-4 pt-4 border-t border-white/10 text-sm italic opacity-90">
                                    <span class="font-bold not-italic text-slate-400 uppercase text-xs tracking-tighter mr-2">Why?</span>
                                    ${explanationText}
                                </div>`;
            
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function goToNext() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                renderQuestion();
            } else {
                showFinalResults();
            }
        }

        function showFinalResults() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <div class="text-center bg-slate-800 p-12 rounded-2xl border border-slate-700 shadow-2xl">
                    <h2 class="text-4xl font-black mb-4">Exam Finished!</h2>
                    <p class="text-6xl font-bold text-orange-500 mb-8">${score} / ${currentQuestions.length}</p>
                    <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 px-10 py-4 rounded-xl font-bold transition">RESTART EXAM</button>
                </div>
            `;
        }

        // Kick off the process
        fetchQuestions();
    </script>
</body>
</html>
