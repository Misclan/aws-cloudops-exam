<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-orange-500 mb-2">CloudOps Exam Pro</h1>
        <p class="text-slate-400">Powered by AWS Lambda & DynamoDB (af-south-1)</p>
    </header>

    <main id="quiz-container" class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p>Fetching questions from Cape Town...</p>
        </div>
        <div id="quiz-content" class="hidden">
            </div>
    </main>

    <script>
        // REPLACE THIS URL with your actual API Gateway endpoint
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/questions';

        let currentQuestions = [];
        let score = 0;
        let currentIndex = 0;

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // If the data is still a string (the "weird" issue), parse it again
                if (typeof data === 'string') {
                    data = JSON.parse(data);
                }
                
                currentQuestions = data;
                displayQuestions();
            } catch (error) {
                console.error("Failed to load questions:", error);
            }
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('quiz-container');
            
            container.innerHTML = `
                <div class="question-box">
                    <h3>Question ${currentIndex + 1} of ${currentQuestions.length}</h3>
                    <p class="question-text">${q.QuestionText}</p>
                    <div id="options-list">
                        ${q.Options.map(opt => `
                            <button class="option-btn" onclick="checkAnswer(this, '${opt}', '${q.CorrectAnswer}', '${q.Explanation}')">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="feedback" class="hidden"></div>
                    <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question</button>
                </div>
            `;
        }

        function checkAnswer(btn, selected, correct, explanation) {
            const feedbackDiv = document.getElementById('feedback');
            // Force visibility and set base Tailwind classes
            feedbackDiv.className = "mt-4 p-4 rounded-lg border block";

            if (selected === correct) {
                btn.className = "option-btn w-full p-3 mb-2 rounded border transition-colors bg-green-600 text-white border-green-700";
                feedbackDiv.classList.add('bg-green-50', 'text-green-800', 'border-green-200');
                feedbackDiv.innerHTML = `<p class="font-bold">✅ Correct!</p>`;
            } else {
                btn.className = "option-btn w-full p-3 mb-2 rounded border transition-colors bg-red-600 text-white border-red-700";
                feedbackDiv.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
                feedbackDiv.innerHTML = `<p class="font-bold">❌ Incorrect.</p><p class="text-sm">Correct answer: ${correct}</p>`;
            }

            feedbackDiv.innerHTML += `
                <div class="mt-2 pt-2 border-t border-gray-300 text-sm italic">
                    <strong>Why?</strong> ${explanation}
                </div>
            `;

            // Show Next button with Tailwind
            const nextBtn = document.getElementById('next-btn');
            nextBtn.className = "mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition block";
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <div class="results-box">
                    <h2>Exam Complete!</h2>
                    <p class="final-score">Your Score: ${score} / ${currentQuestions.length}</p>
                    <button onclick="location.reload()">Try Again</button>
                </div>
            `;
        }

        fetchQuestions();
    </script>
</body>
</html>
