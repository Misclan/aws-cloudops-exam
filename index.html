<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-orange-500 mb-2">CloudOps Exam Pro</h1>
        <p class="text-slate-400">Powered by AWS Lambda & DynamoDB (af-south-1)</p>
    </header>

    <main id="quiz-container" class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p>Fetching questions from Cape Town...</p>
        </div>
        <div id="quiz-content" class="hidden"></div>
    </main>

    <script>
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/questions';

        let questions = [];
        let currentIndex = 0;
        let score = 0;

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // Handle double-stringified Lambda body
                if (typeof data === 'string') data = JSON.parse(data);
                
                // Sort by ID so it's not random every time
                questions = data.sort((a, b) => a.QuestionID - b.QuestionID);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('quiz-content').classList.remove('hidden');
                renderQuestion();
            } catch (error) {
                console.error("Link Failure:", error);
            }
        }

            function displayQuestions(questions) {
                const container = document.getElementById('quiz-content');
                const loading = document.getElementById('loading');
                
                loading.classList.add('hidden');
                container.classList.remove('hidden');

                const shuffled = questions.sort(() => 0.5 - Math.random());
                let currentQ = 0;
                let score = 0;
                let answered = false;
            
            function renderQuestion() {
                const q = questions[currentIndex];
                const content = document.getElementById('quiz-content');
                
                // Clear and build the shell
                content.innerHTML = `
                    <div class="space-y-6">
                        <div class="flex justify-between text-[10px] font-mono text-slate-500 uppercase">
                            <span>Progress: ${currentIndex + 1} / ${questions.length}</span>
                            <span>Score: ${score}</span>
                        </div>
                        <h2 id="question-text" class="text-xl font-bold leading-tight"></h2>
                        <div id="options-list" class="grid gap-3"></div>
                        <div id="feedback" class="hidden p-5 rounded-xl border-2 mt-6"></div>
                        <button id="next-btn" class="hidden w-full bg-orange-600 mt-6 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-orange-500 transition-all">Next Task</button>
                    </div>
                `;

                // USE textContent for the question to avoid 'SyntaxError'
                document.getElementById('question-text').textContent = q.QuestionText;

                const list = document.getElementById('options-list');
                q.Options.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700 hover:border-slate-500 transition-all text-sm";
                    btn.textContent = option; // Safely handles 's and special chars
                    
                    btn.onclick = () => checkAnswer(btn, option, q.CorrectAnswer, q.Explanation);
                    list.appendChild(btn);
                });
            }
            
            function checkAnswer(selectedBtn, choice, correct, why) {
                const feedback = document.getElementById('feedback');
                const nextBtn = document.getElementById('next-btn');
                const allBtns = document.querySelectorAll('#options-list button');

                // Lock interaction
                allBtns.forEach(b => b.disabled = true);
                feedback.classList.remove('hidden');

                const isRight = choice === correct;

                if (isRight) {
                    score++;
                    selectedBtn.classList.add('border-green-500', 'bg-green-500/10', 'text-green-400');
                    feedback.className = "p-5 rounded-xl border-2 border-green-500/30 bg-green-900/20 mt-6";
                    feedback.innerHTML = `<p class="font-bold text-green-400 mb-1">✅ Optimal Solution</p>`;
                } else {
                    selectedBtn.classList.add('border-red-500', 'bg-red-900/20', 'text-red-400');
                    feedback.className = "p-5 rounded-xl border-2 border-red-500/30 bg-red-900/20 mt-6";
                    feedback.innerHTML = `<p class="font-bold text-red-400 mb-1">❌ Inefficient Path</p>
                                        <p class="text-xs text-slate-400 mb-2 underline">Correct: ${correct}</p>`;
                }

                // Safely add the explanation
                const expText = document.createElement('p');
                expText.className = "text-sm text-slate-300 italic border-t border-slate-700 mt-3 pt-3";
                expText.textContent = why;
                feedback.appendChild(expText);

                nextBtn.classList.remove('hidden');
                nextBtn.onclick = () => {
                    currentIndex++;
                    if (currentIndex < questions.length) renderQuestion();
                    else showFinal();
                };
            }
            
            function showFinal() {
    const container = document.getElementById('quiz-container');
    const percent = Math.round((score / questions.length) * 100);
    container.innerHTML = `
        <div class="text-center p-10">
            <h2 class="text-2xl font-black mb-2 uppercase">Exam Complete</h2>
            <div class="text-7xl font-black text-orange-500 my-8">${score} / ${questions.length}</div>
            <p class="text-xl text-slate-400 mb-10">${percent}% Accuracy</p>
            <button onclick="location.reload()" class="bg-slate-700 px-10 py-4 rounded-xl font-bold hover:bg-slate-600 transition-all">RETRY EXAM</button>
        </div>
    `;
}
            }

        fetchQuestions();
    </script>
</body>
</html>
