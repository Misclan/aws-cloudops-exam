<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-orange-500 mb-2">CloudOps Exam Pro</h1>
        <p class="text-slate-400">Powered by AWS Lambda & DynamoDB (af-south-1)</p>
    </header>

    <main id="quiz-container" class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p>Fetching questions from Cape Town...</p>
        </div>
        <div id="quiz-content" class="hidden"></div>
    </main>

    <script>
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/questions';

        async function fetchQuestions() {
            try {
                console.log('Fetching from:', API_URL);
                const response = await fetch(API_URL);
                let data = await response.json();
                
                console.log('Response type:', typeof data);
                
                // Handle double-stringified JSON
                while (typeof data === 'string') {
                    console.log('Parsing stringified JSON...');
                    data = JSON.parse(data);
                }
                
                console.log('Loaded', data.length, 'questions');
                displayQuestions(data);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('loading').innerHTML = 
                    `<p class="text-red-400">Error: ${error.message}<br>Check console for details.</p>`;
            }
        }

        function displayQuestions(questions) {
            const container = document.getElementById('quiz-content');
            const loading = document.getElementById('loading');
            
            loading.classList.add('hidden');
            container.classList.remove('hidden');

            const shuffled = questions.sort(() => 0.5 - Math.random());
            let currentQ = 0;
            let score = 0;
            let answered = false;
            
            function renderQuestion() {
                const q = shuffled[currentQ];
                answered = false;
                
                container.innerHTML = `
                    <div class="mb-8">
                        <div class="flex justify-between items-center mb-4 pb-4 border-b border-slate-700">
                            <span class="text-orange-500 font-bold">Question ${currentQ + 1} of ${shuffled.length}</span>
                            <span class="text-slate-400">Score: ${score}/${currentQ || 1}</span>
                        </div>
                        <h3 class="text-xl font-semibold mb-6" id="qtext"></h3>
                        <div id="options" class="space-y-3 mb-6"></div>
                        <div id="feedback" class="hidden mt-6 p-4 rounded-lg"></div>
                        <button id="nextBtn" class="hidden w-full mt-6 bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-6 rounded-lg transition">
                            ${currentQ < shuffled.length - 1 ? 'Next Question' : 'Show Results'}
                        </button>
                    </div>
                `;
                
                // Set question text safely
                document.getElementById('qtext').textContent = q.QuestionText;
                
                // Create option buttons
                const optionsDiv = document.getElementById('options');
                q.Options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'w-full text-left p-4 rounded bg-slate-700 hover:bg-slate-600 transition border-2 border-transparent';
                    btn.textContent = opt;
                    btn.onclick = () => checkAnswer(opt, q.CorrectAnswer, q.Explanation);
                    optionsDiv.appendChild(btn);
                });
            }
            
            function checkAnswer(selected, correct, explanation) {
                if (answered) return;
                answered = true;
                
                const isCorrect = selected === correct;
                if (isCorrect) score++;
                
                // Update all buttons
                const buttons = document.querySelectorAll('#options button');
                buttons.forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add('opacity-60', 'cursor-not-allowed');
                    
                    if (btn.textContent === correct) {
                        btn.classList.remove('border-transparent');
                        btn.classList.add('border-green-400', 'bg-green-900');
                    }
                    
                    if (btn.textContent === selected && !isCorrect) {
                        btn.classList.remove('border-transparent');
                        btn.classList.add('border-red-400', 'bg-red-900');
                    }
                });
                
                // Show feedback
                const feedback = document.getElementById('feedback');
                feedback.className = `mt-6 p-4 rounded-lg ${isCorrect ? 'bg-green-900/30 border-2 border-green-400' : 'bg-red-900/30 border-2 border-red-400'}`;
                
                const feedbackTitle = document.createElement('p');
                feedbackTitle.className = 'font-bold text-lg mb-2';
                feedbackTitle.textContent = isCorrect ? '✅ Correct!' : '❌ Incorrect';
                feedback.appendChild(feedbackTitle);
                
                if (!isCorrect) {
                    const correctAnswer = document.createElement('p');
                    correctAnswer.className = 'mb-2';
                    correctAnswer.innerHTML = 'The correct answer was: <strong></strong>';
                    correctAnswer.querySelector('strong').textContent = correct;
                    feedback.appendChild(correctAnswer);
                }
                
                const exp = document.createElement('p');
                exp.className = 'text-sm italic mt-3 pt-3 border-t border-slate-600';
                exp.textContent = explanation;
                feedback.appendChild(exp);
                
                // Show next button
                const nextBtn = document.getElementById('nextBtn');
                nextBtn.classList.remove('hidden');
                nextBtn.onclick = () => {
                    currentQ++;
                    if (currentQ < shuffled.length) {
                        renderQuestion();
                    } else {
                        showResults();
                    }
                };
            }
            
            function showResults() {
                const percentage = Math.round((score / shuffled.length) * 100);
                let message = '';
                if (percentage >= 80) message = 'Excellent! You\'re ready! 🎉';
                else if (percentage >= 60) message = 'Good job! Keep practicing. 💪';
                else message = 'Keep studying. You\'ll get there! 📚';
                
                container.innerHTML = `
                    <div class="text-center py-12">
                        <h2 class="text-3xl font-bold mb-4">Exam Complete!</h2>
                        <div class="text-6xl font-bold text-orange-500 my-6">${score} / ${shuffled.length}</div>
                        <p class="text-2xl text-slate-300 mb-4">${percentage}%</p>
                        <p class="text-lg text-slate-400 mb-8">${message}</p>
                        <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 px-8 py-3 rounded-lg font-semibold">
                            Try Again
                        </button>
                    </div>
                `;
            }
            
            renderQuestion();
        }

        fetchQuestions();
    </script>
</body>
</html>
