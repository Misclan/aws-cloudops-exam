<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-orange-500 mb-2">CloudOps Exam Pro</h1>
        <p class="text-slate-400">Powered by AWS Lambda & DynamoDB (af-south-1)</p>
    </header>

    <main id="quiz-container" class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div id="loading" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
            <p>Fetching questions from Cape Town...</p>
        </div>
        <div id="quiz-content" class="hidden">
            </div>
    </main>

    <script>
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/prod/questions'; 

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // Handle the stringified JSON format seen in your Network tab
                if (typeof data === 'string') {
                    data = JSON.parse(data);
                }
                
                currentQuestions = data;
                renderQuestion();
            } catch (error) {
                console.error("Fetch failed:", error);
            }
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('quiz-container');
            
            // 1. Build the base HTML structure
            container.innerHTML = `
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <h2 class="text-xl font-bold mb-6">${q.QuestionText}</h2>
                    <div id="options-container" class="space-y-3"></div>
                    <div id="feedback" class="hidden mt-6 p-4 rounded-lg border"></div>
                    <button id="next-btn" class="hidden mt-6 w-full bg-blue-600 p-3 rounded-lg font-bold" onclick="nextQuestion()">Next Question</button>
                </div>
            `;

            // 2. Add buttons using JavaScript (this ignores apostrophes in the data)
            const optionsContainer = document.getElementById('options-container');
            q.Options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-lg border border-slate-600 hover:bg-slate-700 transition-all";
                btn.textContent = opt;
                
                // This is the "Magic" part: we pass the data safely as a variable, not a string
                btn.onclick = () => handleAnswer(btn, opt, q.CorrectAnswer, q.Explanation);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedBtn, selectedOpt, correctOpt, explanation) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true); // Stop double-clicking

            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');

            if (selectedOpt === correctOpt) {
                score++;
                selectedBtn.classList.add('bg-green-600', 'border-green-500', 'text-white');
                feedback.className = "mt-6 p-4 rounded-lg border border-green-500 bg-green-900/20 text-green-100";
                feedback.innerHTML = `<p class="font-bold">✅ Correct!</p>`;
            } else {
                selectedBtn.classList.add('bg-red-600', 'border-red-500', 'text-white');
                feedback.className = "mt-6 p-4 rounded-lg border border-red-500 bg-red-900/20 text-red-100";
                feedback.innerHTML = `<p class="font-bold">❌ Incorrect. The answer was: ${correctOpt}</p>`;
            }

            // This will finally show the explanation without crashing
            feedback.innerHTML += `<div class="mt-2 pt-2 border-t border-slate-600 text-sm italic"><strong>Why?</strong> ${explanation}</div>`;
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                renderQuestion();
            } else {
                document.getElementById('quiz-container').innerHTML = `<h2 class="text-2xl font-bold text-center">Score: ${score}/${currentQuestions.length}</h2>`;
            }
        }

        fetchQuestions();
    </script>
</body>
</html>
