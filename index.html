<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <main id="quiz-container" class="w-full max-w-2xl">
        <div id="loading" class="text-center">
            <p class="text-xl animate-pulse">Fetching CloudOps Data...</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/prod/questions'; 

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // Handle double-stringified JSON
                if (typeof data === 'string') data = JSON.parse(data);
                
                currentQuestions = data;
                renderQuestion();
            } catch (error) {
                console.error("Fetch failed:", error);
            }
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('quiz-container');
            
            // Create a clean UI shell
            container.innerHTML = `
                <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
                    <h2 id="question-text" class="text-xl font-bold mb-8 leading-relaxed"></h2>
                    <div id="options-list" class="space-y-4"></div>
                    <div id="feedback-area" class="hidden mt-8 p-6 rounded-xl border-2"></div>
                    <button id="next-btn" class="hidden mt-8 w-full bg-orange-600 py-4 rounded-xl font-black">NEXT QUESTION</button>
                </div>
            `;

            // Safely set text using textContent (this ignores all syntax errors)
            document.getElementById('question-text').textContent = q.QuestionText;

            const optionsList = document.getElementById('options-list');
            q.Options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border border-slate-600 bg-slate-700/50 hover:bg-slate-700 transition-all";
                
                // This is the key: textContent treats the option as pure text, not code
                btn.textContent = opt; 
                
                // Use an event listener so we aren't passing strings through HTML
                btn.addEventListener('click', () => handleSelection(btn, opt, q.CorrectAnswer, q.Explanation));
                optionsList.appendChild(btn);
            });
        }

        function handleSelection(selectedBtn, selectedText, correctText, explanationText) {
            // Disable all buttons to prevent double-clicking
            document.querySelectorAll('#options-list button').forEach(b => b.disabled = true);
            
            const feedback = document.getElementById('feedback-area');
            feedback.classList.remove('hidden');

            if (selectedText === correctText) {
                score++;
                selectedBtn.classList.add('border-green-500', 'bg-green-500/10', 'text-green-400');
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-green-500/50 bg-green-900/30 text-green-100";
                feedback.innerHTML = `<p class="font-bold text-lg mb-2 text-green-400">✅ Correct!</p>`;
            } else {
                selectedBtn.classList.add('border-red-500', 'bg-red-500/10', 'text-red-400');
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-red-500/50 bg-red-900/30 text-red-100";
                feedback.innerHTML = `<p class="font-bold text-lg mb-2 text-red-400">❌ Incorrect.</p>
                                    <p class="text-sm opacity-80 mb-2">The answer was: ${correctText}</p>`;
            }

            // Safely add the explanation text
            const expDiv = document.createElement('div');
            expDiv.className = "mt-4 pt-4 border-t border-slate-600 text-sm italic text-slate-300";
            expDiv.innerHTML = `<strong>Why?</strong> `;
            expDiv.appendChild(document.createTextNode(explanationText));
            feedback.appendChild(expDiv);

            const nextBtn = document.getElementById('next-btn');
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                currentIndex++;
                if (currentIndex < currentQuestions.length) renderQuestion();
                else showResult();
            };
        }

        function showResult() {
            document.getElementById('quiz-container').innerHTML = `
                <div class="text-center p-12 bg-slate-800 rounded-2xl border border-slate-700">
                    <h2 class="text-3xl font-bold mb-4">Exam Complete</h2>
                    <p class="text-6xl font-black text-orange-500">${score} / ${currentQuestions.length}</p>
                    <button onclick="location.reload()" class="mt-8 bg-slate-700 px-8 py-3 rounded-lg">Try Again</button>
                </div>
            `;
        }

        fetchQuestions();
    </script>
</body>
</html>
