<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Exam Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        
        .question-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(148, 163, 184, 0.1);
        }
        
        .question-number {
            font-size: 0.85rem;
            color: #f97316;
            font-weight: 700;
        }
        
        .question-text {
            font-size: 1.25rem;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #e2e8f0;
        }
        
        .options-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .option-btn {
            background: rgba(51, 65, 85, 0.5);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 18px 24px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #e2e8f0;
            font-size: 1rem;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .option-btn:hover:not(.disabled) {
            background: rgba(51, 65, 85, 0.8);
            border-color: #f97316;
            transform: translateX(4px);
        }
        
        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .option-btn.correct {
            background: rgba(34, 197, 94, 0.2) !important;
            border-color: #22c55e !important;
            color: #22c55e !important;
        }
        
        .option-btn.incorrect {
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: #ef4444 !important;
            color: #ef4444 !important;
        }
        
        .feedback-box {
            margin-top: 30px;
            padding: 24px;
            border-radius: 12px;
            border: 2px solid;
            display: none;
        }
        
        .feedback-box.show {
            display: block;
        }
        
        .feedback-box.correct {
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
        }
        
        .feedback-box.incorrect {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }
        
        .feedback-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .feedback-explanation {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
            font-style: italic;
        }
        
        .next-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }
        
        .next-btn.show {
            display: block;
        }
        
        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
        }
        
        .results-card {
            text-align: center;
            padding: 60px 40px;
        }
        
        .results-score {
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        
        .results-percentage {
            font-size: 1.5rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        
        .retry-btn {
            padding: 16px 40px;
            background: rgba(51, 65, 85, 0.8);
            border: 2px solid #f97316;
            border-radius: 12px;
            color: #f97316;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .retry-btn:hover {
            background: #f97316;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: #94a3b8;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(249, 115, 22, 0.2);
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid #ef4444;
            border-radius: 12px;
            padding: 24px;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CloudOps Exam Pro</h1>
            <p>Powered by AWS Lambda & DynamoDB (af-south-1)</p>
        </div>
        
        <div class="question-card" id="app">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Loading exam questions...</div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/questions';
        
        // ===== STATE =====
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let answered = false;

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            console.log('App initialized');
            fetchQuestions();
        });

        // ===== FETCH QUESTIONS =====
        async function fetchQuestions() {
            const appDiv = document.getElementById('app');
            
            try {
                console.log('Fetching from:', API_URL);
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                let data = await response.json();
                console.log('Raw response type:', typeof data);
                console.log('Raw response:', data);
                
                // Handle stringified JSON (parse multiple times if needed)
                let attempts = 0;
                while (typeof data === 'string' && attempts < 3) {
                    console.log(`Parse attempt ${attempts + 1}...`);
                    data = JSON.parse(data);
                    attempts++;
                }
                
                console.log('Final data type:', typeof data);
                console.log('Is array?', Array.isArray(data));
                console.log('Length:', data?.length);
                
                if (!Array.isArray(data)) {
                    throw new Error(`Expected array, got ${typeof data}`);
                }
                
                if (data.length === 0) {
                    throw new Error('No questions found in response');
                }
                
                // Shuffle questions
                questions = data.sort(() => Math.random() - 0.5);
                console.log(`✅ Loaded ${questions.length} questions`);
                
                // Render first question
                renderQuestion();
                
            } catch (error) {
                console.error('❌ Fetch error:', error);
                appDiv.innerHTML = `
                    <div class="error-box">
                        <h2 style="margin-bottom: 12px;">Failed to Load Questions</h2>
                        <p style="margin-bottom: 8px;"><strong>Error:</strong> ${error.message}</p>
                        <p style="font-size: 0.9rem; opacity: 0.8;">Check the browser console (F12) for more details.</p>
                        <button class="retry-btn" onclick="location.reload()" style="margin-top: 20px;">Retry</button>
                    </div>
                `;
            }
        }

        // ===== RENDER QUESTION =====
        function renderQuestion() {
            const appDiv = document.getElementById('app');
            const q = questions[currentIndex];
            
            console.log(`Rendering question ${currentIndex + 1}/${questions.length}`);
            
            const optionsHTML = q.Options.map((option, idx) => `
                <button class="option-btn" onclick="selectAnswer('${escapeHtml(option)}')" id="option-${idx}">
                    ${escapeHtml(option)}
                </button>
            `).join('');
            
            appDiv.innerHTML = `
                <div class="question-header">
                    <div class="question-number">
                        Question ${currentIndex + 1} of ${questions.length}
                    </div>
                    <div style="color: #94a3b8; font-size: 0.85rem;">
                        Score: ${score}/${currentIndex}
                    </div>
                </div>

                <div class="question-text">${escapeHtml(q.QuestionText)}</div>

                <div class="options-grid" id="options">
                    ${optionsHTML}
                </div>

                <div class="feedback-box" id="feedback"></div>

                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
                    ${currentIndex < questions.length - 1 ? 'Next Question' : 'View Results'}
                </button>
            `;
            
            answered = false;
        }

        // ===== SELECT ANSWER =====
        function selectAnswer(selectedOption) {
            if (answered) return;
            
            answered = true;
            const q = questions[currentIndex];
            const isCorrect = selectedOption === q.CorrectAnswer;
            
            if (isCorrect) {
                score++;
            }
            
            console.log(`Answer: ${isCorrect ? 'Correct' : 'Incorrect'}`);
            
            // Update all option buttons
            const optionBtns = document.querySelectorAll('.option-btn');
            optionBtns.forEach(btn => {
                btn.classList.add('disabled');
                const btnText = btn.textContent.trim();
                
                if (btnText === q.CorrectAnswer) {
                    btn.classList.add('correct');
                }
                
                if (btnText === selectedOption && !isCorrect) {
                    btn.classList.add('incorrect');
                }
            });
            
            // Show feedback
            const feedbackDiv = document.getElementById('feedback');
            feedbackDiv.className = `feedback-box show ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackDiv.innerHTML = `
                <div class="feedback-title">
                    ${isCorrect ? '✅ Correct!' : '❌ Incorrect'}
                </div>
                ${!isCorrect ? `
                    <div style="margin-top: 12px; font-size: 0.95rem;">
                        <strong>Correct Answer:</strong> ${escapeHtml(q.CorrectAnswer)}
                    </div>
                ` : ''}
                <div class="feedback-explanation">
                    <strong>Why?</strong> ${escapeHtml(q.Explanation)}
                </div>
            `;
            
            // Show next button
            document.getElementById('nextBtn').classList.add('show');
        }

        // ===== NEXT QUESTION =====
        function nextQuestion() {
            currentIndex++;
            
            if (currentIndex >= questions.length) {
                showResults();
            } else {
                renderQuestion();
            }
        }

        // ===== SHOW RESULTS =====
        function showResults() {
            const appDiv = document.getElementById('app');
            const percentage = Math.round((score / questions.length) * 100);
            
            let message = '';
            if (percentage >= 80) {
                message = 'Excellent! You\'re ready! 🎉';
            } else if (percentage >= 60) {
                message = 'Good job! Keep practicing. 💪';
            } else {
                message = 'Keep studying. You\'ll get there! 📚';
            }
            
            appDiv.innerHTML = `
                <div class="results-card">
                    <h2 style="font-size: 2rem; margin-bottom: 20px;">Exam Complete!</h2>
                    <div class="results-score">${score} / ${questions.length}</div>
                    <div class="results-percentage">${percentage}% Correct</div>
                    <p style="font-size: 1.2rem; color: #cbd5e1; margin-bottom: 30px;">${message}</p>
                    <button class="retry-btn" onclick="location.reload()">
                        Try Again
                    </button>
                </div>
            `;
        }

        // ===== HELPER FUNCTIONS =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
