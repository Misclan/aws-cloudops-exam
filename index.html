<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CloudOps Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <main id="quiz-container" class="w-full max-w-2xl">
        <div id="loading" class="text-center">
            <p class="text-xl animate-pulse">Fetching CloudOps Data...</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://04v9z7h7zb.execute-api.af-south-1.amazonaws.com/prod/questions'; 
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        async function fetchQuestions() {
            try {
                const response = await fetch(API_URL);
                let data = await response.json();
                
                // Handle double-stringified JSON if it exists
                if (typeof data === 'string') data = JSON.parse(data);
                
                // Sort by QuestionID if available to keep order
                currentQuestions = data.sort((a, b) => a.QuestionID - b.QuestionID);
                renderQuestion();
            } catch (err) {
                document.getElementById('quiz-container').innerHTML = `<p class="text-red-500">API Error: ${err.message}</p>`;
            }
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('quiz-container');
            
            container.innerHTML = `
                <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
                    <div class="flex justify-between text-xs font-mono text-slate-500 mb-6">
                        <span>QUESTION ${currentIndex + 1} / ${currentQuestions.length}</span>
                        <span>SCORE: ${score}</span>
                    </div>
                    
                    <h2 class="text-xl font-bold mb-8 leading-relaxed">${q.QuestionText}</h2>
                    
                    <div id="options-list" class="space-y-4"></div>
                    
                    <div id="feedback" class="hidden mt-8 p-6 rounded-xl border-2 transition-all"></div>
                    
                    <button id="next-btn" class="hidden mt-8 w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-xl font-black transition-all" 
                            onclick="nextQuestion()">NEXT QUESTION</button>
                </div>
            `;

            const list = document.getElementById('options-list');
            q.Options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border border-slate-600 bg-slate-700/50 hover:bg-slate-700 hover:border-slate-400 transition-all";
                
                // CRITICAL: We use .textContent so the browser doesn't execute the string
                btn.textContent = opt; 
                
                // We pass the index only, to avoid passing messy strings through functions
                btn.onclick = () => checkAnswer(btn, opt);
                list.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected) {
            const q = currentQuestions[currentIndex];
            const feedback = document.getElementById('feedback');
            
            // Lock buttons
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            feedback.classList.remove('hidden');

            const isCorrect = selected === q.CorrectAnswer;

            if (isCorrect) {
                score++;
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-green-500 bg-green-500/10 text-green-400";
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-green-500/50 bg-green-900/30 text-green-100";
                feedback.innerHTML = `<p class="font-bold text-lg mb-2 text-green-400">✅ Correct!</p>`;
            } else {
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-red-500 bg-red-900/10 text-red-400";
                feedback.className = "mt-8 p-6 rounded-xl border-2 border-red-500/50 bg-red-900/30 text-red-100";
                feedback.innerHTML = `<p class="font-bold text-lg mb-2 text-red-400">❌ Incorrect.</p>
                                      <p class="text-sm mb-2 opacity-80">Correct Answer: <span class="font-bold">${q.CorrectAnswer}</span></p>`;
            }

            // The Explanation is injected safely via textContent to prevent crashes
            const whyDiv = document.createElement('div');
            whyDiv.className = "mt-4 pt-4 border-t border-slate-600 text-sm italic text-slate-300";
            whyDiv.innerHTML = `<strong>Why?</strong> `;
            const textNode = document.createTextNode(q.Explanation);
            whyDiv.appendChild(textNode);
            feedback.appendChild(whyDiv);

            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) renderQuestion();
            else {
                document.getElementById('quiz-container').innerHTML = `
                    <div class="text-center bg-slate-800 p-12 rounded-2xl border border-slate-700">
                        <h2 class="text-3xl font-bold mb-4">Exam Complete</h2>
                        <p class="text-5xl text-orange-500 font-bold">${score} / ${currentQuestions.length}</p>
                        <button onclick="location.reload()" class="mt-8 bg-slate-700 px-8 py-3 rounded-lg">Restart</button>
                    </div>
                `;
            }
        }

        fetchQuestions();
    </script>
</body>
</html>
